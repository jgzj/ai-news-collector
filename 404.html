<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 页面未找到 | AI 新闻日报</title>
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
    <style>
        :root{--bg-primary:#0a0a1a;--bg-secondary:#0f0f2a;--accent:#6366f1;--accent-light:#818cf8;--text-primary:#f8fafc;--text-secondary:#94a3b8;--text-muted:#64748b}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg-primary);min-height:100vh;color:var(--text-primary);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
        .error-container{text-align:center;max-width:500px}
        .error-code{font-size:8rem;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1}
        .error-title{font-size:1.5rem;margin:20px 0 10px;color:var(--text-primary)}
        .error-message{color:var(--text-secondary);margin-bottom:30px;line-height:1.6}
        .back-btn{display:inline-block;background:linear-gradient(135deg,var(--accent),var(--accent-light));color:white;text-decoration:none;padding:12px 30px;border-radius:10px;font-weight:600;transition:all 0.3s}
        .back-btn:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(99,102,241,0.3)}
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">404</div>
        <h1 class="error-title">页面未找到</h1>
        <p class="error-message">抱歉，您访问的页面不存在或已被移除。<br>这可能是新闻链接已失效或地址输入有误。</p>
        <a href="./" class="back-btn">返回首页</a>
    </div>
</body>
</html>
